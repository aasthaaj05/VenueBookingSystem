{% load static %}
<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>COEP Venue Booking System | Book Your Campus Spaces</title>
    <meta name="description" content="Reserve venues on COEP campus quickly and efficiently.">
    <meta name="keywords" content="venue, booking, COEP, events, campus">
    
    <!-- Placeholder image as favicon -->
    <link rel="icon" href="static 'Logos/coep_tech_blackppp'" type="image/png">
    <link rel="stylesheet" href="{% static 'accounts/login.css' %}">
    <link rel="stylesheet" href="{% static 'accounts/nav.css' %}">
    <link href='https://unpkg.com/boxicons@2.0.7/css/boxicons.min.css' rel='stylesheet'>
    <script src="{% static 'accounts/nav.js' %}"></script>
    <!-- Linking CSS -->
    <link rel="stylesheet" href="{% static 'users/css/login.css' %}">
    <link rel="stylesheet" href="{% static 'users/css/nav.css' %}">
    
    <!-- Boxicons (For Icons) -->
    <link href="https://unpkg.com/boxicons@2.0.7/css/boxicons.min.css" rel="stylesheet">
    
    <!-- Linking JavaScript -->
    <script src="{% static 'users/js/nav.js' %}" defer></script>

</head>

<body>

    {% include 'home/nav.html' %}

    <div class="wrapper">
        <h2>Login</h2>
        <form action="{% url 'users:login' %}" method="POST">
            {% csrf_token %}
            <div class="input-box">
                <input id="username" name="username" type="text" placeholder="Enter your email" required>
            </div>
            <div class="input-box">
                <input id="password" name="password" type="password" placeholder="Enter password" required>
            </div>
            <div class="input-box button">
                <input type="submit" value="Login">
            </div>
            {% comment %} <div class="text">
                <h3>Don't have an account? <a href="{% url 'users:register' %}">Register</a></h3>
            </div> {% endcomment %}
            <div class="text">
                <h3><a href="{% url 'auth_otp:forgot_password' %}">Forgot Password?</a></h3>
            </div>
        </form>
    </div>
</body>

</html>
