{% load static %} <!-- Load static files -->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unicons.iconscout.com/release/v4.0.0/css/line.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="{% static 'users/css/nav.css' %}">
    <script src="{% static 'users/js/nav.js' %}" defer></script>
    <title>Select Building</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 50px;
        }
        .header {
            font-family: "Helvetica", sans-serif;
            font-size: 32px;
            font-weight: bold;
            text-align: center;
            color: #333;
            margin-top: 7rem;
        }
        .buildings-container {
            display: flex;
            flex-wrap: wrap;
            gap: 18px;
            justify-content: space-between;
        }
        .building-card {
            width: 30%;
            padding: 10px;
            margin-bottom: 20px;
            text-align: center;
            box-shadow: 5px 5px 25px 0px rgba(46, 61, 73, 0.2);
            border-radius: 20px;
        }
        .building-card button {
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            border: 0;
            background-color: #007bff;
            color: white;
            font-size: 15px;
            transition: all 0.3s ease;
        }
        .building-card button:hover {
            background-color: #0056b3;
        }
        @media (max-width: 1200px) {
            .building-card {
                width: 45%;
            }
        }
        @media (max-width: 768px) {
            .building-card {
                width: 100%;
            }
        }
    </style>
</head>

<body>
    {% include 'request_booking/nav.html' %}
    <div class="header">Select a Building</div>
    <div class="buildings-container">
        {% for building in buildings %}
        <div class="building-card">
            <h3>{{ building }}</h3>
            <button onclick="window.location.href='/request_booking/user_dashboard/{{ building|urlencode }}/'">View Venues</button>
        </div>
        {% endfor %}
    </div>
</body>
</html>
