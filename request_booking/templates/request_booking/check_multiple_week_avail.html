{% load static %}
{% block content %}
<div class="container mt-4">
    <h2>Multi-Week Booking Request</h2>
    <form method="post" action="{% url 'request_booking:request_multiple_week_availability_view' %}">
        {% csrf_token %}

        <div class="form-group mb-3">
            <label for="venue">Select Venue:</label>
            <select class="form-control" name="venue" id="venue" required>
                {% for venue in venues %}
                    <option value="{{ venue.id }}">{{ venue.venue_name }} (Capacity: {{ venue.capacity }})</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group mb-3">
            <label for="eventType">Event Type:</label>
            <input type="text" name="eventType" class="form-control" required>
        </div>

        <div class="form-group mb-3">
            <label for="fullName">Full Name:</label>
            <input type="text" name="fullName" class="form-control" required>
        </div>

        <div class="form-group mb-3">
            <label for="email">Email:</label>
            <input type="email" name="email" class="form-control">
        </div>

        <div class="form-group mb-3">
            <label for="organization_name">Organization Name:</label>
            <input type="text" name="organization_name" class="form-control" required>
        </div>

        <div class="form-group mb-3">
            <label for="start_date">Start Date:</label>
            <input type="date" name="start_date" class="form-control" required>
        </div>

        <div class="form-group mb-3">
            <label for="start_time">Start Time:</label>
            <input type="time" name="start_time" class="form-control" required>
        </div>

        <div class="form-group mb-3">
            <label for="end_time">End Time:</label>
            <input type="time" name="end_time" class="form-control" required>
        </div>

        <div class="form-group mb-3">
            <label for="num_weeks">Number of Weeks:</label>
            <input type="number" name="num_weeks" class="form-control" min="1" required>
        </div>

        <div class="form-group mb-3">
            <label>Select Weekdays:</label><br>
            <div class="form-check form-check-inline">
                <input class="form-check-input" type="checkbox" name="weekdays" value="0" id="monday">
                <label class="form-check-label" for="monday">Monday</label>
            </div>
            <div class="form-check form-check-inline">
                <input class="form-check-input" type="checkbox" name="weekdays" value="1" id="tuesday">
                <label class="form-check-label" for="tuesday">Tuesday</label>
            </div>
            <div class="form-check form-check-inline">
                <input class="form-check-input" type="checkbox" name="weekdays" value="2" id="wednesday">
                <label class="form-check-label" for="wednesday">Wednesday</label>
            </div>
            <div class="form-check form-check-inline">
                <input class="form-check-input" type="checkbox" name="weekdays" value="3" id="thursday">
                <label class="form-check-label" for="thursday">Thursday</label>
            </div>
            <div class="form-check form-check-inline">
                <input class="form-check-input" type="checkbox" name="weekdays" value="4" id="friday">
                <label class="form-check-label" for="friday">Friday</label>
            </div>
            <div class="form-check form-check-inline">
                <input class="form-check-input" type="checkbox" name="weekdays" value="5" id="saturday">
                <label class="form-check-label" for="saturday">Saturday</label>
            </div>
            <div class="form-check form-check-inline">
                <input class="form-check-input" type="checkbox" name="weekdays" value="6" id="sunday">
                <label class="form-check-label" for="sunday">Sunday</label>
            </div>
        </div>

        <div class="form-group mb-3">
            <label for="phone">Phone Number:</label>
            <input type="text" name="phone" class="form-control" required>
        </div>

        <div class="form-group mb-3">
            <label for="guestCount">Guest Count:</label>
            <input type="number" name="guestCount" class="form-control" min="1" required>
        </div>

        <div class="form-group mb-3">
            <label for="eventDetails">Event Details:</label>
            <textarea name="eventDetails" class="form-control" rows="3"></textarea>
        </div>

        <div class="form-group mb-3">
            <label for="purpose">Purpose:</label>
            <textarea name="purpose" class="form-control" rows="2"></textarea>
        </div>

        <div class="form-group mb-3">
            <label for="specialRequirements">Special Requirements:</label>
            <textarea name="specialRequirements" class="form-control" rows="2"></textarea>
        </div>

        <button type="submit" class="btn btn-primary">Submit Booking Request</button>
    </form>
</div>
{% endblock %}
