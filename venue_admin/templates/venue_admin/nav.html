{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>COEP Venue Booking System | Book Your Campus Spaces</title>

  <!-- Correct favicon -->
  <link rel="icon" href="{% static 'Logos/coep_tech_black.png' %}" type="image/png">

  <!-- Vendor CSS -->
  <link href="{% static 'assets/vendor/bootstrap/css/bootstrap.min.css' %}" rel="stylesheet">
  <link href="{% static 'assets/vendor/bootstrap-icons/bootstrap-icons.css' %}" rel="stylesheet">
  <link href="{% static 'assets/vendor/aos/aos.css' %}" rel="stylesheet">
  <link href="{% static 'assets/vendor/glightbox/css/glightbox.min.css' %}" rel="stylesheet">
  <link href="{% static 'assets/vendor/swiper/swiper-bundle.min.css' %}" rel="stylesheet">

  <link href="{% static 'assets/css/main.css' %}" rel="stylesheet">
</head>

<body>

<header id="header" class="header d-flex align-items-center fixed-top">
  <div class="container-fluid container-xl position-relative d-flex align-items-center">

    
    <a href="{% url 'venue_admin:home' %}" class="logo d-flex align-items-center me-auto">
      <h1 class="sitename" style="color:white;">COEP Tech</h1>
    </a>

    <!-- ✅ NAVBAR -->
    <nav id="navmenu" class="navmenu">
      <ul>

        <li><a href="{% url 'venue_admin:home' %}">Home</a></li>

        <li><a href="{% url 'venue_admin:get_requests' %}" class="btn signup-btn">
          View Requests
        </a></li>

        <li><a href="{% url 'venue_admin:get_cumulative_requests' %}" class="btn signup-btn">
          View Cumulative Requests
        </a></li>

        <li><a href="{% url 'venue_admin:approved_bookings' %}">
          Bookings
        </a></li>

        <li><a href="{% url 'venue_admin:approved_cumulative_bookings_view' %}">
          Cumulative Bookings
        </a></li>

        <!-- ⭐ REQUIRED FEATURE -->
        <li><a href="{% url 'venue_admin:venue_schedule' %}">
          Bookings Calendar
        </a></li>

        <li><a href="{% url 'venue_admin:venue_edit_start' %}">
          Edit Venue
        </a></li>

        <li><a href="{% url 'venue_admin:user_list' %}">
          Edit Users
        </a></li>

      </ul>

      <i class="mobile-nav-toggle d-xl-none bi bi-list"></i>
    </nav>

    <!-- Logout -->
    <a class="btn-getstarted" href="{% url 'venue_admin:logout' %}">
      Log Out
    </a>

  </div>
</header>


<!-- Vendor JS -->
<script src="{% static 'assets/vendor/bootstrap/js/bootstrap.bundle.min.js' %}"></script>
<script src="{% static 'assets/js/main.js' %}"></script>

</body>
</html>
