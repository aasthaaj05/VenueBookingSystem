{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Navigation - COEP Tech</title>

    <!-- Favicons -->
    <link href="{% static 'assets/img/favicon.png' %}" rel="icon">
    <link href="{% static 'assets/img/apple-touch-icon.png' %}" rel="apple-touch-icon">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com" rel="preconnect">
    <link href="https://fonts.gstatic.com" rel="preconnect" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600;700;800&family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <!-- Vendor CSS Files -->
    <link href="{% static 'assets/vendor/bootstrap/css/bootstrap.min.css' %}" rel="stylesheet">
    <link href="{% static 'assets/vendor/bootstrap-icons/bootstrap-icons.css' %}" rel="stylesheet">
    <link href="{% static 'assets/vendor/aos/aos.css' %}" rel="stylesheet">
    <link href="{% static 'assets/vendor/glightbox/css/glightbox.min.css' %}" rel="stylesheet">
    <link href="{% static 'assets/vendor/swiper/swiper-bundle.min.css' %}" rel="stylesheet">

    <!-- Main CSS File -->
    <link href="{% static 'assets/css/main.css' %}" rel="stylesheet">
</head>
<body>
    <header id="header" class="header d-flex align-items-center fixed-top">
        <div class="container-fluid container-xl position-relative d-flex align-items-center">
            <a href="{% url 'request_booking:index' %}" class="logo d-flex align-items-center me-auto">
                <h1 class="sitename">COEP Tech</h1>
            </a>

            <nav id="navmenu" class="navmenu">
                <ul>
                  <li><a href="#hero" class="active">Home</a></li>
                  {% comment %} <li><a href="#about">About</a></li> {% endcomment %}
                  <li><a href="#services">Services</a></li>
                  
                  {% comment %} <li><a href="#team">Team</a></li> {% endcomment %}
                  
                  <li><a href="#recent-blog-postst">Venues</a></li>
                  
                  {% comment %} <li><a href="#contact">Contact</a></li> {% endcomment %}
        
                  <li><a href="{% url 'venue_admin:get_requests' %}" class="btn signup-btn">View Requests</a></li>
                    
                  <li><a href="{% url 'venue_admin:home' %}#features">VENUE ADMIN</a></li>
                  <li><a href="{% url 'venue_admin:approved_bookings' %}">Bookings</a></li>
        
                </ul>
                <i class="mobile-nav-toggle d-xl-none bi bi-list"></i>
              </nav>

            <a class="btn-getstarted" href="{% url 'venue_admin:logout' %}#about">Log Out</a>
            <!-- <a class="btn-getstarted" id="logoutButton" href="#">Log Out</a> -->
        </div>
    </header>
</body>
</html>
