{% load static %}  <!-- Load Django static files -->

<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Venue</title>

    <!-- Linking CSS -->
    <link rel="stylesheet" href="{% static 'users/css/nav.css' %}">
    <link rel="stylesheet" href="{% static 'users/css/signup.css' %}">
    
    <!-- Boxicons (For Icons) -->
    <link href="https://unpkg.com/boxicons@2.0.7/css/boxicons.min.css" rel="stylesheet">
    
    <!-- Linking JavaScript -->
    <script src="{% static 'users/js/nav.js' %}" defer></script>
</head>

<body>
    <nav class="nav">
        <i class="uil uil-bars navOpenBtn"></i>
        <a href="#" class="logo">Venue Booking System</a>
        <ul class="nav-links">
            <i class="uil uil-times navCloseBtn"></i>
            <li><a href="#">Home</a></li>
            <li><a href="#">Services</a></li>
            <li><a href="#">Products</a></li>
            <li><a href="#">About Us</a></li>
            <li><a href="#">Contact Us</a></li>
        </ul>
        <i class="uil uil-search search-icon" id="searchIcon"></i>
        <div class="search-box">
            <i class="uil uil-search search-icon"></i>
            <input type="text" placeholder="Search here..." />
        </div>
    </nav>

    <div class="wrapper">
        <h2>Create Venue</h2>

        <form action="{% url 'venue_admin:create_venue' %}" method="post">
            {% csrf_token %}
            
            <div class="input-box">
                <input name="venue_name" type="text" placeholder="Enter venue name" required>
            </div>
            
            <div class="input-box">
                <textarea name="description" placeholder="Enter description" rows="4" required></textarea>
            </div>
            
            <div class="input-box">
                <input name="photo_url" type="url" placeholder="Enter photo URL" required>
            </div>
            
            <div class="input-box">
                <input name="capacity" type="number" placeholder="Enter capacity" required>
            </div>
            
            <div class="input-box">
                <input name="address" type="text" placeholder="Enter address" required>
            </div>
            
            <div class="input-box">
                <input name="facilities" type="text" placeholder="Enter facilities (comma separated)" required>
            </div>
            
            <div class="input-box">
                <input name="department_incharge" type="text" placeholder="Enter department in charge" required>
            </div>

            <div class="input-box button">
                <input type="submit" value="Create Venue">
            </div>

        </form>
    </div>
</body>
</html>
