<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New User</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            padding: 20px;
            background-color: #f8f9fa;
        }
        .card {
            margin-top: 20px;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1>Add New User</h1>
            <a href="{% url 'venue_admin:user_list' %}" class="btn btn-secondary">Back to List</a>
        </div>

        <div class="card shadow">
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="name" class="form-label">Name</label>
                            <input type="text" class="form-control" id="name" name="name" required>
                        </div>
                        <div class="col-md-6">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="email" name="email" required>
                        </div>
                    </div>
                    
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" class="form-control" id="password" name="password" required>
                        </div>
                        {% comment %} <div class="col-md-6">
                            <label for="role" class="form-label">Role</label>
                            <select class="form-select" id="role" name="role" required>
                                {% for role in role_choices %}
                                <option value="{{ role.0 }}">{{ role.1 }}</option>
                                {% endfor %}
                            </select>
                        </div> {% endcomment %}
                        <div class="col-md-6">
                            <label for="role" class="form-label">Role</label>
                            <select class="form-select" id="role" name="role" required>
                                <option value="Faculty">Faculty</option>
                                <option value="Venue_admin">Venue_admin</option>
                            </select>
                        </div>
                        
                    </div>
                    
                    {% comment %} <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="organization_name" class="form-label">Organization Name</label>
                            <input type="text" class="form-control" id="organization_name" name="organization_name">
                        </div>
                        <div class="col-md-6">
                            <label for="organization_type" class="form-label">Organization Type</label>
                            <input type="text" class="form-control" id="organization_type" name="organization_type">
                        </div>
                    </div> {% endcomment %}
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="organization_name" class="form-label">Organization Name</label>
                            <select class="form-select" id="organization_name" name="organization_name" required>
                                <option value="Faculty">Faculty</option>
                                <option value="Venue_admin">Venue_admin</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label for="organization_type" class="form-label">Organization Type</label>
                            <select class="form-select" id="organization_type" name="organization_type" required>
                                <option value="Faculty">Faculty</option>
                                <option value="Venue_admin">Venue_admin</option>
                            </select>
                        </div>
                    </div>
                    
                    
                    <div class="text-end">
                        <button type="submit" class="btn btn-primary">Add User</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Get the select elements
    const role = document.getElementById('role');
    const orgName = document.getElementById('organization_name');
    const orgType = document.getElementById('organization_type');

    // Sync all values when any of them changes
    function syncValues(value) {
        role.value = value;
        orgName.value = value;
        orgType.value = value;
    }

    // Add event listeners
    [role, orgName, orgType].forEach(select => {
        select.addEventListener('change', (e) => {
            syncValues(e.target.value);
        });
    });
</script>
</body>
</html>
